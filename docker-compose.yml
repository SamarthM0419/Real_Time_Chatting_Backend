services:

  auth-service:
    image: samarth02198/auth-service:latest
    build:
      context: ./authService
      dockerfile: Dockerfile
    env_file:
      - ./authService/.env
    expose:
      - "5000"
    networks:
      - backend-network
    restart: unless-stopped

  profile-service:
    image: samarth02198/profile-service:latest
    build:
      context: ./profileService
      dockerfile: Dockerfile
    env_file:
      - ./profileService/.env
    expose:
      - "5001"
    networks:
      - backend-network
    restart: unless-stopped

  request-service:
    image: samarth02198/request-service:latest
    build:
      context: ./requestService
      dockerfile: Dockerfile
    env_file:
      - ./requestService/.env
    expose:
      - "5002"
    networks:
      - backend-network
    restart: unless-stopped

  chat-service:
    image: samarth02198/chat-service:latest
    build:
      context: ./chatService
      dockerfile: Dockerfile
    env_file:
      - ./chatService/.env
    expose:
      - "5003"
    networks:
      - backend-network
    restart: unless-stopped


  nginx:
    image: samarth02195/api-gateway:latest
    container_name: api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - profile-service
      - request-service
      - chat-service
    networks:
    - backend-network

networks:
  backend-network:
    driver: bridge